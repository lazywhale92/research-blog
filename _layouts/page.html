---
layout: default
---
<article class="page-content prose">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: 'Research blog' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}<p class="lede">{{ page.summary }}</p>{% endif %}
  </header>
  {{ content }}
</article>

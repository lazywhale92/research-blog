---
layout: default
---
<article class="page-content prose">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: 'Research blog' | escape }}</p>
    <h1>{{ page.title | escape }}</h1>
    {% if page.summary %}<p class="lede">{{ page.summary | escape }}</p>{% endif %}
  </header>
  {{ content }}
</article>
